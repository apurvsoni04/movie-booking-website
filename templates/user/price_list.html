<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Pricing</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: black;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

<h2>🎬 Movie Ticket Pricing</h2>

<table>
    <tr>
        <th>Movie</th>
        <th>Screen</th>
        <th>Show Time</th>
        <th>Silver (₹)</th>
        <th>Gold (₹)</th>
        <th>Platinum (₹)</th>
    </tr>

    {% for row in price_data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>₹ {{ row[3] }}</td>
        <td>₹ {{ row[4] }}</td>
        <td>₹ {{ row[5] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
